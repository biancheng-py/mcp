name: Keep ModelScope Space Alive

on:
  schedule:
    - cron: '*/30 * * * *'   # 每30分钟一次
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Space
        run: |
          curl -sS "https://modelscope.cn/studios/THUDMGLM/kronosdm" -o /dev/null -w "Status: %{http_code}\n"
          echo "Ping completed."
